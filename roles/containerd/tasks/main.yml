---
- name: Install containerd
  apt:
    name: containerd
    state: present
    update_cache: yes

- name: Create containerd config directory
  file:
    path: /etc/containerd
    state: directory
    mode: '0755'

- name: Generate containerd default config
  shell: containerd config default
  register: containerd_cfg
  changed_when: false

- name: Write containerd config (systemd cgroup + pause image)
  copy:
    dest: /etc/containerd/config.toml
    content: "{{ containerd_cfg.stdout
      | regex_replace('SystemdCgroup = false', 'SystemdCgroup = true')
      | regex_replace('sandbox_image = \".*\"', 'sandbox_image = \"registry.k8s.io/pause:3.10\"') }}"
  notify: restart containerd

- name: Ensure containerd service is enabled and running
  systemd:
    name: containerd
    enabled: yes
    state: started

# Handlers
- name: restart containerd
  systemd:
    name: containerd
    state: restarted